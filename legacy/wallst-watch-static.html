<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WALLST WATCH | Banking Command Center</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap');
:root {
  --bg-dark:#0a0c0f;--bg-panel:#0f1216;--bg-card:#141820;--border:#1e2530;--border-glow:#2a3040;
  --text-primary:#e8eaed;--text-secondary:#8b95a5;--text-dim:#4a5568;
  --accent-red:#ff3b3b;--accent-green:#00e676;--accent-amber:#ffc107;--accent-blue:#2196f3;--accent-cyan:#00bcd4;
  --critical:#ff1744;--high:#ff6d00;--elevated:#ffc400;--moderate:#00e676;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg-dark);color:var(--text-primary);font-family:'Inter',sans-serif;overflow-x:hidden;min-height:100vh;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--bg-dark);}::-webkit-scrollbar-thumb{background:var(--border-glow);border-radius:2px;}

.ticker-bar{height:32px;background:linear-gradient(180deg,#0d1015,#0a0c0f);border-bottom:1px solid var(--border);display:flex;align-items:center;overflow:hidden;}
.ticker-scroll{display:flex;animation:tickerScroll 60s linear infinite;white-space:nowrap;}
@keyframes tickerScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ticker-item{display:flex;align-items:center;gap:6px;padding:0 18px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;border-right:1px solid var(--border);}
.ticker-item .symbol{color:var(--text-secondary);font-weight:600;}.ticker-item .price{color:var(--text-primary);}
.ticker-item .change.up{color:var(--accent-green);}.ticker-item .change.down{color:var(--accent-red);}

.header{height:48px;background:var(--bg-panel);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;}
.header-left{display:flex;align-items:center;gap:20px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;}.logo span:first-child{color:var(--text-primary);}.logo span:last-child{color:var(--accent-red);}
.nav-tabs{display:flex;gap:4px;}
.nav-tab{padding:6px 14px;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-secondary);cursor:pointer;border-radius:3px;transition:all .2s;user-select:none;}
.nav-tab:hover{color:var(--text-primary);background:var(--bg-card);}.nav-tab.active{color:var(--accent-red);background:rgba(255,59,59,.08);}
.header-right{display:flex;align-items:center;gap:14px;}
.live-badge{display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-secondary);}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--accent-red);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(255,59,59,.4)}50%{opacity:.7;box-shadow:0 0 0 6px rgba(255,59,59,0)}}
.bank-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent-amber);background:rgba(255,193,7,.08);padding:4px 10px;border:1px solid rgba(255,193,7,.2);border-radius:3px;}

.main-grid{display:grid;grid-template-columns:240px 1fr 300px;height:calc(100vh - 108px);gap:0;}
.left-panel{background:var(--bg-panel);border-right:1px solid var(--border);overflow-y:auto;}
.panel-section{border-bottom:1px solid var(--border);}
.panel-header{display:flex;align-items:center;gap:8px;padding:12px 14px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent-red);}
.panel-header .dot{width:5px;height:5px;border-radius:50%;background:var(--accent-red);}
.news-item{padding:10px 14px;border-bottom:1px solid rgba(30,37,48,.5);cursor:pointer;transition:background .2s;}.news-item:hover{background:var(--bg-card);}
.news-item .time{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-dim);margin-bottom:4px;}
.news-item .headline{font-size:12px;color:var(--text-secondary);line-height:1.5;}.news-item .headline strong{color:var(--text-primary);font-weight:600;}
.commodity-row{display:flex;justify-content:space-between;align-items:center;padding:6px 14px;font-family:'JetBrains Mono',monospace;font-size:11px;}
.commodity-row .name{color:var(--text-secondary);}.commodity-row .price{color:var(--text-primary);}
.commodity-row .chg.up{color:var(--accent-green);}.commodity-row .chg.down{color:var(--accent-red);}

.center-panel{background:var(--bg-dark);overflow-y:auto;position:relative;}
.center-header{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;border-bottom:1px solid var(--border);background:rgba(10,12,15,.95);position:sticky;top:0;z-index:10;}
.center-title{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-secondary);}.center-title span{color:var(--accent-red);}

.right-panel{background:var(--bg-panel);border-left:1px solid var(--border);overflow-y:auto;}
.detail-header{padding:14px;border-bottom:1px solid var(--border);}
.detail-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent-red);}
.detail-content{padding:14px;}

.bank-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:16px;}
.bank-card{background:var(--bg-card);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .3s;overflow:hidden;}
.bank-card:hover{border-color:var(--accent-red);box-shadow:0 0 20px rgba(255,59,59,.08);transform:translateY(-2px);}
.bank-card.selected{border-color:var(--accent-red);box-shadow:0 0 30px rgba(255,59,59,.15);}
.bank-card-header{padding:14px 16px 10px;display:flex;justify-content:space-between;align-items:flex-start;}
.bank-symbol{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;}
.brb{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:2px;}
.rc{background:rgba(255,23,68,.15);color:var(--critical);border:1px solid rgba(255,23,68,.3);}
.rh{background:rgba(255,109,0,.15);color:var(--high);border:1px solid rgba(255,109,0,.3);}
.re{background:rgba(255,196,0,.15);color:var(--elevated);border:1px solid rgba(255,196,0,.3);}
.rm{background:rgba(0,230,118,.1);color:var(--moderate);border:1px solid rgba(0,230,118,.2);}
.bank-name{padding:0 16px;font-size:12px;color:var(--text-secondary);font-weight:500;}
.bank-metrics{padding:12px 16px;display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.bm{display:flex;flex-direction:column;gap:2px;}.bm .l{font-size:9px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text-dim);}
.bm .v{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;}.v.up{color:var(--accent-green);}.v.down{color:var(--accent-red);}.v.n{color:var(--text-primary);}
.bank-bar{height:3px;background:var(--border);margin-top:4px;}.bank-bar-fill{height:100%;border-radius:1px;}

.detail-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.ds{background:var(--bg-card);border-radius:4px;padding:10px;}.ds .l{font-size:9px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text-dim);margin-bottom:4px;}
.ds .val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;}
.dd{height:1px;background:var(--border);margin:16px 0;}
.dst{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent-cyan);margin-bottom:10px;}
.dsig{padding:8px 10px;background:var(--bg-card);border-radius:4px;margin-bottom:6px;font-size:11px;color:var(--text-secondary);line-height:1.5;border-left:2px solid var(--border);}
.dsig.warn{border-left-color:var(--accent-red);}.dsig.ok{border-left-color:var(--accent-green);}.dsig.caution{border-left-color:var(--accent-amber);}
.dq{background:linear-gradient(135deg,rgba(255,59,59,.04),transparent);border:1px solid rgba(255,59,59,.1);border-radius:4px;padding:12px 14px;margin-top:12px;}
.dq .t{font-size:12px;font-style:italic;color:var(--text-secondary);line-height:1.6;margin-bottom:6px;}
.dq .a{font-size:9px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;}
.signal-tags{display:flex;flex-wrap:wrap;gap:4px;}.stag{font-family:'JetBrains Mono',monospace;font-size:9px;padding:3px 8px;background:rgba(33,150,243,.08);color:var(--accent-blue);border:1px solid rgba(33,150,243,.15);border-radius:2px;}
.psr{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(30,37,48,.5);}
.psr .l{font-size:11px;color:var(--text-secondary);}.psr .v{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--text-primary);}

/* CREDIT */
.credit-view{padding:16px;}
.pfc{background:var(--bg-card);border:1px solid var(--border);border-radius:6px;margin-bottom:12px;overflow:hidden;transition:all .3s;}
.pfc:hover{border-color:rgba(255,59,59,.3);}
.pfc.expanded{border-color:var(--accent-cyan);box-shadow:0 0 20px rgba(0,188,212,.06);}
.pfc-top{padding:16px 18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.pfc-left{display:flex;align-items:center;gap:14px;}
.pfc-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);width:24px;}
.pfc-name{font-size:14px;font-weight:600;}.pfc-sub{font-size:11px;color:var(--text-dim);margin-top:2px;}
.pfc-right{display:flex;align-items:center;gap:12px;}
.prb{display:flex;gap:2px;}.prb .b{width:14px;height:6px;border-radius:1px;background:var(--border);}.prb .b.r{background:var(--critical);}.prb .b.o{background:var(--high);}.prb .b.y{background:var(--elevated);}.prb .b.g{background:var(--moderate);}
.prl{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:1px;padding:4px 10px;border-radius:3px;}
.pfc-arrow{font-size:14px;color:var(--text-dim);transition:transform .3s;}.pfc.expanded .pfc-arrow{transform:rotate(180deg);color:var(--accent-cyan);}
.pfc-body{display:none;padding:0 18px 18px;border-top:1px solid var(--border);}
.pfc.expanded .pfc-body{display:block;padding-top:16px;}
.pdesc{font-size:12px;color:var(--text-secondary);line-height:1.7;margin-bottom:14px;}
.psg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.psb{background:var(--bg-dark);border-radius:4px;padding:10px 12px;text-align:center;}
.psb .n{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--text-primary);margin-bottom:2px;}
.psb .lb{font-size:9px;color:var(--text-dim);letter-spacing:.5px;text-transform:uppercase;line-height:1.4;}
.pcs{background:rgba(255,59,59,.03);border:1px solid rgba(255,59,59,.08);border-radius:4px;padding:12px 14px;margin-bottom:12px;}
.pcs .tl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--accent-red);letter-spacing:1px;margin-bottom:6px;}
.pcs .bd{font-size:11px;color:var(--text-secondary);line-height:1.6;}
.phi{display:flex;gap:10px;margin-bottom:8px;padding:8px 10px;background:var(--bg-dark);border-radius:4px;}
.phi .hn{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent-cyan);font-weight:700;min-width:20px;}
.phi .ht{font-size:11px;color:var(--text-secondary);line-height:1.5;}

/* MACRO */
.macro-view{padding:16px;}
.mcat{margin-bottom:20px;}
.mch{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.mch .dot{width:6px;height:6px;border-radius:50%;}
.mg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.mc{background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:12px;cursor:pointer;transition:all .2s;}
.mc:hover{border-color:var(--accent-amber);transform:translateY(-1px);}.mc.selected{border-color:var(--accent-cyan);box-shadow:0 0 15px rgba(0,188,212,.08);}
.mc .num{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--text-dim);margin-bottom:4px;}
.mc .name{font-size:11px;font-weight:600;color:var(--text-primary);margin-bottom:6px;line-height:1.3;}
.mc .status{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;}
.mc .assets{font-size:9px;color:var(--text-dim);margin-top:6px;line-height:1.4;}
.sb{color:var(--accent-green);}.sr{color:var(--accent-red);}.sy{color:var(--accent-amber);}.so{color:var(--high);}
.ci{display:flex;gap:8px;margin-bottom:6px;font-size:11px;color:var(--text-secondary);line-height:1.4;}
.ci-i{color:var(--accent-amber);font-weight:700;min-width:14px;}
.cli{display:flex;gap:8px;margin-bottom:6px;font-size:11px;color:var(--text-secondary);line-height:1.4;}
.cli-n{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent-cyan);font-weight:700;min-width:16px;}

/* DIMON */
.dimon-view{padding:16px;}
.dh{background:linear-gradient(135deg,rgba(255,59,59,.06),rgba(255,59,59,.01));border:1px solid rgba(255,59,59,.12);border-radius:8px;padding:24px;margin-bottom:20px;text-align:center;}
.dh-t{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;margin-bottom:4px;}
.dh-s{font-size:13px;color:var(--text-secondary);margin-bottom:16px;line-height:1.6;}
.dsr{display:flex;justify-content:center;gap:30px;flex-wrap:wrap;}
.dbs{text-align:center;}.dbs .n{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;color:var(--accent-red);}.dbs .lb{font-size:9px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
.dsec{margin-bottom:20px;}
.dsec-t{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.dsec-t .sn{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent-red);background:rgba(255,59,59,.08);padding:3px 8px;border-radius:2px;}
.dc{background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:10px;cursor:pointer;transition:all .3s;}
.dc:hover{border-color:rgba(255,59,59,.3);}
.dc.expanded{border-color:var(--accent-cyan);}
.dc-t{font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;}
.dc-p{font-size:11px;color:var(--text-dim);line-height:1.5;}
.dc-b{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-size:12px;color:var(--text-secondary);line-height:1.7;}
.dc.expanded .dc-b{display:block;}
.dc .arr{color:var(--text-dim);transition:transform .3s;font-size:14px;}.dc.expanded .arr{transform:rotate(90deg);color:var(--accent-cyan);}
.lc{background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:10px;}
.lc-n{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent-red);margin-bottom:6px;}
.lc-t{font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:8px;}
.lc-b{font-size:12px;color:var(--text-secondary);line-height:1.7;}

.view-container{display:none;}.view-container.active{display:block;}

.bottom-bar{position:fixed;bottom:0;left:0;right:0;height:28px;background:var(--bg-panel);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:20px;z-index:100;}
.bottom-bar .item{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);display:flex;align-items:center;gap:6px;}
.bottom-bar .cl{color:var(--accent-red);font-weight:700;letter-spacing:1px;}
.bottom-scroll{flex:1;overflow:hidden;}
.bottom-scroll-inner{display:flex;white-space:nowrap;animation:bScroll 40s linear infinite;}
@keyframes bScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.bhl{display:flex;align-items:center;gap:10px;padding-right:40px;font-size:11px;}
.bhl .tag{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:2px;}
.tc{background:rgba(255,23,68,.15);color:var(--critical);}.th{background:rgba(255,109,0,.15);color:var(--high);}
.bhl .txt{color:var(--text-secondary);font-size:11px;}
</style>
</head>

  document.getElementById('cm').innerHTML=CM.map(c=>`<div class="commodity-row"><span class="name">${c.n}</span><span class="price">${c.p}</span><span class="chg ${c.d}">${c.c} ${c.d==='up'?'▲':'▼'}</span></div>`).join('');
  document.getElementById('rt').innerHTML=RT.map(r=>`<div class="commodity-row"><span class="name">${r.n}</span><span class="price">${r.p}</span><span class="chg ${r.d}">${r.c}</span></div>`).join('');
  let bh=[...BH,...BH];document.getElementById('bs').innerHTML=bh.map(h=>`<div class="bhl"><span class="tag ${h.tc}">${h.tg}</span><span class="txt">${h.tx}</span></div>`).join('');
  renderBankMap();renderCredit();renderMacro();renderDimon();
  document.querySelectorAll('.nav-tab').forEach(tab=>{tab.addEventListener('click',()=>{
    const t=tab.dataset.tab;
    document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));tab.classList.add('active');
    document.querySelectorAll('.view-container').forEach(v=>v.classList.remove('active'));
    document.getElementById('view-'+t).classList.add('active');
    const labels={bankmap:'WALL STREET BANKING COMMAND CENTER',credit:'DIMON CREDIT SYSTEM — NINE PILLARS',macro:'MACRO REGIME DASHBOARD',dimon:'DIMON OUTLOOK — MENTAL MODELS & FRAMEWORKS'};
    document.getElementById('cl').innerHTML=`<span>◆</span> ${labels[t]}`;
    const titles={bankmap:'INTEL DETAIL',credit:'PILLAR DETAIL',macro:'INDICATOR DETAIL',dimon:'FRAMEWORK DETAIL'};
    document.getElementById('rpTitle').textContent=titles[t];
    document.getElementById('dc').innerHTML='<div style="text-align:center;padding:40px 20px;color:var(--text-dim);font-size:12px;">Select an item to view<br>detailed intelligence</div>';
  });});
  setInterval(()=>{document.getElementById('utc').textContent=new Date().toUTCString().split(' ')[4];},1000);
  document.getElementById('utc').textContent=new Date().toUTCString().split(' ')[4];
  setTimeout(()=>selBank(0),400);
}

function renderBankMap(){
  document.getElementById('bg').innerHTML=B.map((b,i)=>`<div class="bank-card" id="bk-${i}" onclick="selBank(${i})">
    <div class="bank-card-header"><div class="bank-symbol">${b.sym}</div><div class="brb ${b.rc}">${b.rk}</div></div>
    <div class="bank-name">${b.nm}</div>
    <div class="bank-metrics"><div class="bm"><span class="l">Price</span><span class="v n">$${b.pr}</span></div><div class="bm"><span class="l">Change</span><span class="v ${b.d}">${b.ch}</span></div><div class="bm"><span class="l">Mkt Cap</span><span class="v n">${b.mc}</span></div><div class="bm"><span class="l">CET1</span><span class="v n">${b.c1}</span></div></div>
    <div class="bank-bar"><div class="bank-bar-fill" style="width:${b.rl*10}%;background:${b.rl>=8?'var(--accent-red)':b.rl>=6?'var(--accent-amber)':'var(--accent-green)'}"></div></div>
  </div>`).join('');
}

function renderCredit(){
  document.getElementById('cv').innerHTML=`<div style="margin-bottom:16px;"><div style="font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;">DIMON'S NINE PILLARS OF CREDIT</div><div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">Click any pillar to expand full analysis with case studies and actionable signals</div></div>`+
  P.map((p,i)=>{
    const bl=Array.from({length:10},(_,j)=>`<div class="b ${j<p.rk?(p.rk>=9?'r':p.rk>=7?'o':'g'):''}">`+'</div>').join('');
    const rc=p.rk>=9?'var(--critical)':p.rk>=8?'var(--high)':'var(--elevated)';
    return `<div class="pfc" id="pc-${i}"><div class="pfc-top" onclick="togPillar(${i})"><div class="pfc-left"><div class="pfc-num">${p.n}</div><div><div class="pfc-name">${p.nm}</div><div class="pfc-sub">${p.sub}</div></div></div><div class="pfc-right"><div class="prb">${bl}</div><div class="prl" style="background:${rc}15;color:${rc};border:1px solid ${rc}40">${p.rl}</div><div class="pfc-arrow">▼</div></div></div>
    <div class="pfc-body"><div class="pdesc">${p.desc}</div><div class="psg">${p.stats.map(s=>`<div class="psb"><div class="n">${s.v}</div><div class="lb">${s.l}</div></div>`).join('')}</div>
    <div class="pcs"><div class="tl">◆ CASE STUDY · ${p.cs.t}</div><div class="bd">${p.cs.b}</div></div>
    <div style="margin-top:12px;"><div style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent-cyan);margin-bottom:8px;">★ HOW TO APPLY THIS PILLAR</div>${p.hw.map((h,j)=>`<div class="phi"><div class="hn">0${j+1}</div><div class="ht">${h}</div></div>`).join('')}</div>
    <div style="margin-top:12px;"><div style="font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--accent-blue);margin-bottom:8px;">WATCH SIGNALS</div><div class="signal-tags">${p.sigs.map(s=>`<span class="stag">${s}</span>`).join('')}</div></div></div></div>`;
  }).join('');
}

function renderMacro(){
  document.getElementById('mv').innerHTML=MC.map(cat=>`<div class="mcat"><div class="mch" style="color:${cat.color}"><div class="dot" style="background:${cat.color}"></div>${cat.title}</div><div class="mg">${cat.inds.map(m=>`<div class="mc" id="mc-${m.n}" onclick="selMacro(${m.n})"><div class="num">#${m.n}</div><div class="name">${m.nm}</div><div class="status ${m.sc}">◆ ${m.st}</div><div class="assets">${m.as}</div></div>`).join('')}</div></div>`).join('');
}

function renderDimon(){
  document.getElementById('dv').innerHTML=`
  <div class="dh"><div class="dh-t">HOW JAMIE DIMON READS THE WORLD</div><div class="dh-s">Mental Models, Economic Frameworks, and the Strategic Worldview<br>of the Most Influential Banker on the Planet</div><div class="dsr"><div class="dbs"><div class="n">$3.9T</div><div class="lb">JPM Total Assets</div></div><div class="dbs"><div class="n">9</div><div class="lb">Credit Pillars</div></div><div class="dbs"><div class="n">20+</div><div class="lb">Years as CEO</div></div><div class="dbs"><div class="n">∞</div><div class="lb">Scenarios Considered</div></div></div></div>
  <div class="dsec"><div class="dsec-t"><span class="sn">02</span>CORE ECONOMIC PHILOSOPHY</div>${DP.map((p,i)=>`<div class="dc" id="dp-${i}" onclick="togDC('dp-${i}')"><div class="dc-t">${p.t}<span class="arr">►</span></div><div class="dc-p">${p.p}</div><div class="dc-b">${p.b}</div></div>`).join('')}</div>
  <div class="dsec"><div class="dsec-t"><span class="sn">03</span>KEY MENTAL MODELS & FRAMEWORKS</div>${DF.map((f,i)=>`<div class="dc" id="df-${i}" onclick="togDC('df-${i}')"><div class="dc-t">${f.t}<span class="arr">►</span></div><div class="dc-p">${f.p}</div><div class="dc-b">${f.b}</div></div>`).join('')}</div>
  <div class="dsec"><div class="dsec-t"><span class="sn">09</span>FIVE LESSONS FROM THE DIMON APPROACH</div>${DL.map(l=>`<div class="lc"><div class="lc-n">LESSON ${l.n}</div><div class="lc-t">${l.t}</div><div class="lc-b">${l.b}</div></div>`).join('')}</div>
  <div class="dq" style="margin:0 0 20px"><div class="t">"Jamie Dimon's analytical framework is, at its core, a commitment to taking the world seriously — in its complexity, its interconnectedness, its unpredictability, and its capacity for both tremendous prosperity and catastrophic failure."</div><div class="a">— SYNTHESIS</div></div>`;
}

function selBank(i){
  document.querySelectorAll('.bank-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('bk-'+i).classList.add('selected');
  const b=B[i];
  document.getElementById('dc').innerHTML=`
    <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;">${b.sym}</div>
    <div style="font-size:12px;color:var(--text-secondary);margin-bottom:16px;">${b.nm}</div>
    <div class="detail-stat-grid"><div class="ds"><div class="l">Price</div><div class="val ${b.d}">$${b.pr}</div></div><div class="ds"><div class="l">Day Change</div><div class="val ${b.d}">${b.ch}</div></div><div class="ds"><div class="l">Market Cap</div><div class="val">${b.mc}</div></div><div class="ds"><div class="l">CET1 Ratio</div><div class="val">${b.c1}</div></div><div class="ds"><div class="l">NII Guide</div><div class="val">${b.ni}</div></div><div class="ds"><div class="l">Risk Level</div><div class="val" style="color:${b.rl>=7?'var(--accent-red)':b.rl>=5?'var(--accent-amber)':'var(--accent-green)'}">${b.rk}</div></div></div>
    <div class="dd"></div><div class="dst">◆ SIGNALS & INTELLIGENCE</div>
    ${b.sg.map(s=>`<div class="dsig ${s.y}">${s.t}</div>`).join('')}
    <div class="dq"><div class="t">"${b.q}"</div><div class="a">— INTELLIGENCE BRIEF</div></div>`;
}

function togPillar(i){
  const el=document.getElementById('pc-'+i);
  const was=el.classList.contains('expanded');
  document.querySelectorAll('.pfc').forEach(c=>c.classList.remove('expanded'));
  if(!was){
    el.classList.add('expanded');
    const p=P[i];const rc=p.rk>=9?'var(--critical)':p.rk>=8?'var(--high)':'var(--elevated)';
    document.getElementById('dc').innerHTML=`
      <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-dim);margin-bottom:4px;">PILLAR ${p.n}</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;">${p.nm}</div>
      <div style="font-size:11px;color:var(--text-secondary);margin-bottom:8px;">${p.sub}</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:${rc};margin-bottom:12px;">SYSTEMIC RISK: ${p.rl}</div>
      <div class="dd"></div><div class="dst">KEY METRICS</div>
      ${p.stats.map(s=>`<div class="psr"><span class="l">${s.l}</span><span class="v">${s.v}</span></div>`).join('')}
      <div class="dd"></div><div class="dst">WATCH SIGNALS</div>
      <div class="signal-tags">${p.sigs.map(s=>`<span class="stag">${s}</span>`).join('')}</div>
      <div class="dq" style="margin-top:16px"><div class="t">"Build the institution so it survives across a wide range of adverse outcomes, rather than betting on a single scenario."</div><div class="a">— JAMIE DIMON</div></div>`;
    setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'nearest'}),100);
  }
}

function selMacro(num){
  document.querySelectorAll('.mc').forEach(c=>c.classList.remove('selected'));
  const el=document.getElementById('mc-'+num);if(el)el.classList.add('selected');
  let ind=null;MC.forEach(cat=>{cat.inds.forEach(m=>{if(m.n===num)ind=m;});});
  if(!ind)return;
  document.getElementById('dc').innerHTML=`
    <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-dim);margin-bottom:4px;">INDICATOR #${ind.n}</div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;margin-bottom:4px;">${ind.nm}</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;margin-bottom:8px;" class="${ind.sc}">◆ SIGNAL: ${ind.st}</div>
    <div style="font-size:11px;color:var(--text-dim);margin-bottom:14px;">KEY ASSETS: ${ind.as}</div>
    <div class="dd"></div><div class="dst">⚠ SIGNAL COMBINATIONS</div>
    ${ind.co.map(c=>`<div class="ci"><span class="ci-i">◆</span><span>${c}</span></div>`).join('')}
    <div class="dd"></div><div class="dst">✓ INTERPRETATION CHECKLIST</div>
    ${ind.cl.map((c,j)=>`<div class="cli"><span class="cli-n">${j+1}.</span><span>${c}</span></div>`).join('')}
    <div class="dd"></div><div class="dst">ANALYST NOTE</div>
    <div style="font-size:11px;color:var(--text-secondary);line-height:1.7;font-style:italic;">${ind.nt}</div>`;
}

function togDC(id){
  const el=document.getElementById(id);
  el.classList.toggle('expanded');
  let item=null;
  DP.forEach((p,i)=>{if('dp-'+i===id)item={type:'Philosophy',t:p.t,b:p.b};});
  DF.forEach((f,i)=>{if('df-'+i===id)item={type:'Framework',t:f.t,b:f.b};});
  if(item&&el.classList.contains('expanded')){
    document.getElementById('dc').innerHTML=`
      <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-dim);margin-bottom:4px;">${item.type.toUpperCase()}</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;margin-bottom:12px;">${item.t}</div>
      <div style="font-size:12px;color:var(--text-secondary);line-height:1.7;">${item.b}</div>
      <div class="dq" style="margin-top:16px"><div class="t">"The appropriate response is not to try harder to predict — but to build institutions that can withstand a wide range of outcomes."</div><div class="a">— JAMIE DIMON</div></div>`;
  }
}

init();
</script>
</body>
</html>
